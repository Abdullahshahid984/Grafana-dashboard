@"
apiVersion: v1
kind: Pod
metadata:
  name: curltest
  namespace: api-cims-v1
spec:
  automountServiceAccountToken: false
  containers:
  - name: curltest
    image: curlimages/curl:latest
    command: ["sleep", "3600"]
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
  restartPolicy: Never
"@ | Out-File -FilePath curltest.yaml -Encoding utf8
